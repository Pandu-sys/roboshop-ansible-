- name: configurig mongodb server 
  hosts: mongodb
  become: yes
  tasks: 
  - name: copy mongodb repo 
    copy:
      src: mongo.repo 
      dest: /etc/yum.repos.d/mongo.repo
  - name: install mongodb server
    package:
      name: mondodb-org 
      state: present 
  - name: alloq remote connections
    replace: 
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0;'
  - name: start and enable mongodb 
    service:
      name: mongodb 
      state: started 
      enabled: yes 
